<div class="container mt-4">
  <div class="row">
    <div class="col-md-12">
      <h2>Job Search</h2>
      
      <!-- Search Form -->
      <div class="card mb-4">
        <div class="card-body">
          <form [formGroup]="searchForm" (ngSubmit)="onSearch()">
            <div class="row">
              <div class="col-md-4 mb-3">
                <label for="title" class="form-label">Job Title</label>
                <input type="text" class="form-control" id="title" formControlName="title" placeholder="e.g. Software Engineer">
              </div>
              <div class="col-md-4 mb-3">
                <label for="location" class="form-label">Location</label>
                <input type="text" class="form-control" id="location" formControlName="location" placeholder="e.g. New York">
              </div>
              <div class="col-md-4 mb-3">
                <label for="jobType" class="form-label">Job Type</label>
                <select class="form-select" id="jobType" formControlName="jobType">
                  <option value="">All Types</option>
                  <option value="full-time">Full Time</option>
                  <option value="part-time">Part Time</option>
                  <option value="contract">Contract</option>
                  <option value="internship">Internship</option>
                </select>
              </div>
            </div>
            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
              <button type="submit" class="btn btn-primary" [disabled]="loading">Search</button>
            </div>
          </form>
        </div>
      </div>
      
      <!-- Error and Success Messages -->
      <div *ngIf="error" class="alert alert-danger" role="alert">
        {{ error }}
      </div>
      <div *ngIf="successMessage" class="alert alert-success" role="alert">
        {{ successMessage }}
      </div>
      
      <!-- Loading Spinner -->
      <div *ngIf="loading" class="d-flex justify-content-center my-4">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
      </div>
      
      <!-- Jobs List -->
      <div *ngIf="!loading && jobs.length === 0" class="alert alert-info" role="alert">
        No jobs found matching your criteria.
      </div>
      
      <div class="row row-cols-1 row-cols-md-2 g-4">
        <div *ngFor="let job of jobs" class="col">
          <div class="card h-100">
            <div class="card-body">
              <h5 class="card-title">{{ job.title }}</h5>
              <h6 class="card-subtitle mb-2 text-muted">{{ job.company_name }}</h6>
              <p class="card-text">{{ job.description | slice:0:150 }}...</p>
              <ul class="list-unstyled">
                <li><strong>Location:</strong> {{ job.location }}</li>
                <li><strong>Job Type:</strong> {{ job.job_type }}</li>
                <li><strong>Salary Range:</strong> {{ job.salary_range }}</li>
              </ul>
            </div>
            <div class="card-footer">
              <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                <button class="btn btn-outline-primary me-md-2" (click)="viewJobDetails(job.id)">View Details</button>
                <button *ngIf="userType === 'seeker'" class="btn btn-primary" (click)="applyForJob(job.id)" [disabled]="loading">
                  Apply Now
                </button>
                <button *ngIf="userType !== 'seeker'" class="btn btn-primary" (click)="applyForJob(job.id)">
                  Login to Apply
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
