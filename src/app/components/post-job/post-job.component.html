<div class="post-job-container">
  <div class="post-job-box">
    <h2>Post a New Job</h2>
    
    <form [formGroup]="jobForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="title">Job Title</label>
        <input 
          type="text" 
          id="title" 
          formControlName="title" 
          class="form-control"
          [class.is-invalid]="jobForm.get('title')?.invalid && jobForm.get('title')?.touched"
          placeholder="e.g. Senior Software Engineer">
        <div class="invalid-feedback" *ngIf="jobForm.get('title')?.invalid && jobForm.get('title')?.touched">
          Job title is required
        </div>
      </div>

      <div class="form-group">
        <label for="company">Company Name</label>
        <input 
          type="text" 
          id="company" 
          formControlName="company" 
          class="form-control"
          [class.is-invalid]="jobForm.get('company')?.invalid && jobForm.get('company')?.touched"
          placeholder="Your company name">
        <div class="invalid-feedback" *ngIf="jobForm.get('company')?.invalid && jobForm.get('company')?.touched">
          Company name is required
        </div>
      </div>

      <div class="form-group">
        <label for="location">Location</label>
        <input 
          type="text" 
          id="location" 
          formControlName="location" 
          class="form-control"
          [class.is-invalid]="jobForm.get('location')?.invalid && jobForm.get('location')?.touched"
          placeholder="e.g. New York, NY or Remote">
        <div class="invalid-feedback" *ngIf="jobForm.get('location')?.invalid && jobForm.get('location')?.touched">
          Location is required
        </div>
      </div>

      <div class="form-row">
        <div class="form-group col-md-6">
          <label for="type">Job Type</label>
          <select 
            id="type" 
            formControlName="type" 
            class="form-control"
            [class.is-invalid]="jobForm.get('type')?.invalid && jobForm.get('type')?.touched">
            <option value="">Select job type</option>
            <option *ngFor="let type of jobTypes" [value]="type">{{type}}</option>
          </select>
          <div class="invalid-feedback" *ngIf="jobForm.get('type')?.invalid && jobForm.get('type')?.touched">
            Job type is required
          </div>
        </div>

        <div class="form-group col-md-6">
          <label for="experience">Experience Level</label>
          <select 
            id="experience" 
            formControlName="experience" 
            class="form-control"
            [class.is-invalid]="jobForm.get('experience')?.invalid && jobForm.get('experience')?.touched">
            <option value="">Select experience level</option>
            <option *ngFor="let level of experienceLevels" [value]="level">{{level}}</option>
          </select>
          <div class="invalid-feedback" *ngIf="jobForm.get('experience')?.invalid && jobForm.get('experience')?.touched">
            Experience level is required
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="salary">Salary Range</label>
        <input 
          type="text" 
          id="salary" 
          formControlName="salary" 
          class="form-control"
          [class.is-invalid]="jobForm.get('salary')?.invalid && jobForm.get('salary')?.touched"
          placeholder="e.g. $80,000 - $100,000">
        <div class="invalid-feedback" *ngIf="jobForm.get('salary')?.invalid && jobForm.get('salary')?.touched">
          Salary range is required
        </div>
      </div>

      <div class="form-group">
        <label for="description">Job Description</label>
        <textarea 
          id="description" 
          formControlName="description" 
          class="form-control"
          [class.is-invalid]="jobForm.get('description')?.invalid && jobForm.get('description')?.touched"
          rows="4"
          placeholder="Describe the role and responsibilities"></textarea>
        <div class="invalid-feedback" *ngIf="jobForm.get('description')?.invalid && jobForm.get('description')?.touched">
          Job description is required
        </div>
      </div>

      <div class="form-group">
        <label for="requirements">Requirements</label>
        <textarea 
          id="requirements" 
          formControlName="requirements" 
          class="form-control"
          [class.is-invalid]="jobForm.get('requirements')?.invalid && jobForm.get('requirements')?.touched"
          rows="4"
          placeholder="List the required skills and qualifications"></textarea>
        <div class="invalid-feedback" *ngIf="jobForm.get('requirements')?.invalid && jobForm.get('requirements')?.touched">
          Requirements are required
        </div>
      </div>

      <div class="form-group">
        <label for="benefits">Benefits</label>
        <textarea 
          id="benefits" 
          formControlName="benefits" 
          class="form-control"
          [class.is-invalid]="jobForm.get('benefits')?.invalid && jobForm.get('benefits')?.touched"
          rows="4"
          placeholder="List the benefits and perks"></textarea>
        <div class="invalid-feedback" *ngIf="jobForm.get('benefits')?.invalid && jobForm.get('benefits')?.touched">
          Benefits are required
        </div>
      </div>

      <div class="alert alert-danger" *ngIf="error">
        {{ error }}
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" routerLink="/recruiter/dashboard">Cancel</button>
        <button 
          type="submit" 
          class="btn btn-primary" 
          [disabled]="jobForm.invalid || loading">
          {{ loading ? 'Posting...' : 'Post Job' }}
        </button>
      </div>
    </form>
  </div>
</div>
