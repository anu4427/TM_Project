<div class="login-container">
  <div class="login-box">
    <h2>Login</h2>
    
    <div class="user-type-selector">
      <button 
        [class.active]="userType === 'seeker'"
        (click)="setUserType('seeker')">
        Job Seeker
      </button>
      <button 
        [class.active]="userType === 'recruiter'"
        (click)="setUserType('recruiter')">
        Recruiter
      </button>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email" 
          class="form-control"
          [class.is-invalid]="isFieldInvalid('email')"
          placeholder="Enter your email">
        <div class="invalid-feedback" *ngIf="isFieldInvalid('email')">
          <div *ngIf="hasError('email', 'required')">Email is required</div>
          <div *ngIf="hasError('email', 'email')">Please enter a valid email</div>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password" 
          class="form-control"
          [class.is-invalid]="isFieldInvalid('password')"
          placeholder="Enter your password">
        <div class="invalid-feedback" *ngIf="isFieldInvalid('password')">
          <div *ngIf="hasError('password', 'required')">Password is required</div>
          <div *ngIf="hasError('password', 'minlength')">Password must be at least 6 characters</div>
        </div>
      </div>

      <div class="alert alert-danger" *ngIf="error">
        {{ error }}
      </div>

      <button 
        type="submit" 
        class="btn btn-primary" 
        [disabled]="loginForm.invalid || loading">
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>
    </form>

    <div class="register-link">
      <p>Don't have an account? <a routerLink="/register">Register here</a></p>
    </div>
  </div>
</div>
