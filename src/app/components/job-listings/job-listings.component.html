<div class="job-listings-container">
  <div class="filters-section">
    <h2>Find Your Next Job</h2>
    
    <form [formGroup]="filterForm" class="filters-form">
      <div class="search-box">
        <input 
          type="text" 
          formControlName="search" 
          class="form-control" 
          placeholder="Search jobs by title, company, or keywords">
      </div>

      <div class="filter-options">
        <select formControlName="type" class="form-control">
          <option *ngFor="let type of jobTypes" [value]="type">{{type}}</option>
        </select>

        <select formControlName="location" class="form-control">
          <option *ngFor="let location of locations" [value]="location">{{location}}</option>
        </select>
      </div>
    </form>
  </div>

  <div class="results-section">
    <div class="results-header">
      <h3>{{ filteredJobs.length }} Jobs Found</h3>
    </div>

    <div class="job-cards">
      <div *ngFor="let job of filteredJobs" class="job-card">
        <div class="job-header">
          <h4 class="job-title">{{ job.title }}</h4>
          <span class="job-company">{{ job.company }}</span>
        </div>

        <div class="job-details">
          <div class="detail-item">
            <i class="fas fa-map-marker-alt"></i>
            <span>{{ job.location }}</span>
          </div>
          <div class="detail-item">
            <i class="fas fa-briefcase"></i>
            <span>{{ job.type }}</span>
          </div>
          <div class="detail-item">
            <i class="fas fa-dollar-sign"></i>
            <span>{{ job.salary }}</span>
          </div>
          <div class="detail-item">
            <i class="fas fa-calendar-alt"></i>
            <span>Posted {{ formatDate(job.posted) }}</span>
          </div>
        </div>

        <div class="job-description">
          <p>{{ job.description }}</p>
        </div>

        <div class="job-requirements">
          <h5>Requirements:</h5>
          <p>{{ job.requirements }}</p>
        </div>

        <div class="job-actions">
          <button 
            class="btn" 
            [class.btn-primary]="!job.applied"
            [class.btn-success]="job.applied"
            [disabled]="job.applied"
            (click)="applyForJob(job.id)">
            {{ job.applied ? 'Applied' : 'Apply Now' }}
          </button>
          <button class="btn btn-outline">Save Job</button>
        </div>
      </div>
    </div>
  </div>
</div>
